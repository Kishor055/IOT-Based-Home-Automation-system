<!DOCTYPE html>
<html>
<head>
    <title>Smart Home Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }

        .camera {
            margin-top: 20px;
        }

        img {
            width: 700px;
            border-radius: 10px;
            border: 3px solid white;
        }

        .card {
            display: inline-block;
            padding: 20px;
            margin: 10px;
            background: #222;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>🏠 Smart Home Automation</h1>

    <div class="card">
        <h2>💡 Light</h2>
    </div>

    <div class="card">
        <h2>🌀 Fan</h2>
    </div>

    <div class="card">
        <h2>❄️ AC</h2>
    </div>

    <div class="camera">
        <h2>📷 Live CSI Camera</h2>

        <img src="{{ url_for('video_feed') }}">
    </div>

</body>
</html>
